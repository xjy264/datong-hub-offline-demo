name: datong-map
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.0
    container_name: datong-map-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请配置MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-datong_map}
      MYSQL_USER: ${MYSQL_USER:-datong}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?请配置MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3311}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    mem_limit: 512m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_PASSWORD}\" mysqladmin ping -h127.0.0.1 -u\"$${MYSQL_USER}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: datong-map-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?请配置REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    mem_limit: 128m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: datong-map-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?请配置MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请配置MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9011}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9012}:9001"
    volumes:
      - minio-data:/data
    mem_limit: 384m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: datong-map-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8011
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-datong_map}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MYSQL_USER: ${MYSQL_USER:-datong}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?请配置MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?请配置REDIS_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?请配置MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?请配置MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-datong-map}
      JWT_SECRET: ${JWT_SECRET:?请配置JWT_SECRET}
      APP_PRODUCTION: ${APP_PRODUCTION:-false}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      MAX_FILE_SIZE: 50MB
      MAX_REQUEST_SIZE: 100MB
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=70 -XX:+ExitOnOutOfMemoryError
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8011}:8011"
    mem_limit: 768m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8011/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: datong-map-frontend
    build:
      context: ../frontend
    container_name: datong-map-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8012}:80"
    mem_limit: 64m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  minio-data:
