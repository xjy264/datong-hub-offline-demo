limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
  listen 80;
  server_name _;
  server_tokens off;
  client_max_body_size 100m;
  gzip on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  root /usr/share/nginx/html;
  index index.html;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ~ ^/api/auth/(login|register)$ {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://backend:8011;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;
  }

  location /api/ {
    proxy_pass http://backend:8011/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
  }

  location /actuator/ {
    proxy_pass http://backend:8011/actuator/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
